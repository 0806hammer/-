            <h1>我是小哲 (Ham)</h1>
            <h2>用理工邏輯 Debug 動作的教育者</h2>
            <p>
                我目前就讀於成功大學，同時也是一名排球校隊運動員與時尚模特兒。
                這種跨領域的斜槓生活，讓我對「效率」與「自律」有著近乎潔癖的堅持。
            </p>
            <p>
                我曾有豐富的國小補教經驗，這讓我更懂得如何與孩子溝通，
                並將複雜的流體力學轉化為簡單易懂的指令。
                「簡單，是終極的複雜」，我的目標是讓每位學員都能在最短時間內找回水中的自在。
            </p>
